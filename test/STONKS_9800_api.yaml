      draw_set_alpha:
        description: "Sets the transparency level for drawing (0.0 = invisible, 1.0 = opaque)."
        syntax: "draw_set_alpha(alpha)"
        parameters:
          - "alpha: number - Alpha value 0.0-1.0"
        returns: "void"
        example: |
