        description: "Opens a text file for reading."
        syntax: "file_text_open_read(filename)"
        parameters:
          - "filename: string - File path"
        returns: "number - File handle"
        example: |
          let file = file_text_open_read("data.txt")
      file_text_open_write:
        description: "Opens a text file for writing. Creates the file if it doesn't exist."
        syntax: "file_text_open_write(filename)"
        parameters:
          - "filename: string - File path"
        returns: "number - File handle"
